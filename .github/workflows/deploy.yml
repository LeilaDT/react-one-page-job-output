name: Deploy Website
on:
  push:
    branches:
      - main
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v6
            - name: Set up Node.js(Install dependencies and run tests)
              run: npm ci
            - name: Lint code
              run: npm run lint
            - name: Test code
              run: npm test
    build:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: Get Code
              uses: actions/checkout@v6
            - name: Set up Node.js(Install dependencies)
              run: npm ci 
            - name: Build website
              run: npm run build
            - name: Upload build artifacts
              uses: actions/upload-artifact@v3
              with:
                name: dist-files
                path: dist
    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Get Code
              run: echo "Deploying website..."